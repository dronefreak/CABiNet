name: cabinet
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  - pip:
      # GPU torch: replace index-url for your CUDA driver variant.
      # CPU-only: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - torch>=2.0.0
      - torchvision>=0.15.0
      # All other runtime + dev deps are declared in pyproject.toml
      - "-e .[dev]"
