name: cabinet
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  - pip:
      # Deep learning — GPU build; for CPU-only replace with:
      # pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - torch>=2.0.0
      - torchvision>=0.15.0
      - torchsummary>=1.5.0
      # Data processing
      - numpy>=1.24.0
      - Pillow>=9.5.0
      - opencv-python>=4.7.0
      # Config management
      - hydra-core>=1.3.0
      - omegaconf>=2.3.0
      # Logging & progress
      - tqdm>=4.65.0
      - rich>=13.3.0
      # Dev / testing
      - pytest>=7.3.0
      - pytest-cov>=4.0.0
      - ruff>=0.4.0
      - mypy>=1.3.0
      - bandit>=1.7.0
      - pre-commit>=3.0.0
